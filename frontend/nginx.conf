server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a resolver + variable upstream makes nginx
    # resolve "backend" at request time instead of at startup, so the frontend
    # no longer crashes with "host not found in upstream" if the backend is
    # still starting up.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback: let Vue Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service.
    location /api/ {
        set $backend backend;
        proxy_pass http://$backend:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded images served by the backend.
    location /uploads/ {
        set $backend backend;
        proxy_pass http://$backend:8000$request_uri;
        proxy_set_header Host $host;
    }
}
