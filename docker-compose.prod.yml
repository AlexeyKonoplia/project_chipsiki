# Продакшен-стек: НЕ собирает образы, а тянет готовые из ghcr.io
# (их публикует GitHub Actions при пуше в main).
#
# Использование на сервере:
#   cp .env.example .env   # заполнить секреты, FRONTEND_PORT=80
#   docker compose -f docker-compose.prod.yml up -d
#
# Обновление после нового пуша в main:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reviews}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reviews}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/alexeykonoplia/project_chipsiki-backend:${TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-reviews}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-koh0}
    volumes:
      - uploads_data:/app/uploads
    # Только localhost: наружу не торчит, фронт ходит по внутренней сети.
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    image: ghcr.io/alexeykonoplia/project_chipsiki-frontend:${TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend
    # На сервере поставить FRONTEND_PORT=80 в .env.
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
  uploads_data:
