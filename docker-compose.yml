services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reviews}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reviews}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-reviews}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-koh0}
    volumes:
      - uploads_data:/app/uploads
    # Bound to localhost only: not exposed to the internet. The frontend
    # reaches it over the internal Docker network as http://backend:8000.
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    # On the server set FRONTEND_PORT=80 (or 443 behind a TLS proxy).
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  db_data:
  uploads_data:
